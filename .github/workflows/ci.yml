name: CI
on:
  push:
  pull_request:
jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ qt6-base-dev libqt6charts6-dev libcurl4-openssl-dev libsqlite3-dev
      - run: cmake --preset debug
      - run: cmake --build --preset debug --parallel
      - run: ctest --preset debug
